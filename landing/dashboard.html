<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — StoppAI</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--nero2:#12121a;--nero3:#16161f;--oro:#c8a96e;--oro2:#b8944e;--verde:#6bcf7f;--rosso:#ff6b6b;--grigio:#888;--grigio2:#bbb;--bianco:#f5f3ee;--bordo:#1e1e2e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--bianco);overflow:hidden;height:100vh}

/* LAYOUT */
.layout{display:flex;height:100vh}
.sidebar{width:220px;background:var(--nero2);border-right:1px solid var(--bordo);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:20px 16px;border-bottom:1px solid var(--bordo);font-size:16px;font-weight:800;letter-spacing:2px}
.sb-logo span{color:var(--oro)}
.sb-user{padding:14px 16px;border-bottom:1px solid var(--bordo);font-size:12px;color:var(--grigio)}
.sb-user .name{color:var(--bianco);font-weight:700;font-size:13px;margin-bottom:2px}
.sb-user .piano{display:inline-block;background:var(--oro);color:var(--bg);padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;margin-top:4px}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-item{padding:11px 16px;color:var(--grigio);font-size:13px;cursor:pointer;transition:0.15s;border-left:3px solid transparent}
.sb-item:hover{color:var(--bianco);background:rgba(200,169,110,0.06)}
.sb-item.active{color:var(--oro);background:rgba(200,169,110,0.1);border-left-color:var(--oro);font-weight:600}
.sb-footer{padding:12px 16px;border-top:1px solid var(--bordo)}
.sb-footer button{width:100%;padding:10px;background:none;border:1px solid var(--bordo);color:var(--grigio);border-radius:6px;cursor:pointer;font-family:'DM Sans';font-size:12px;font-weight:600}
.sb-footer button:hover{border-color:var(--rosso);color:var(--rosso)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:16px 24px;border-bottom:1px solid var(--bordo);display:flex;justify-content:space-between;align-items:center}
.main-header h2{font-size:18px;font-weight:700}
.main-header .stato{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em}
.main-header .stato.accettato{background:rgba(107,207,127,0.15);color:var(--verde)}
.main-header .stato.in_attesa{background:rgba(200,169,110,0.15);color:var(--oro)}
.main-content{flex:1;overflow-y:auto;padding:24px}

/* CARDS */
.d-card{background:var(--nero2);border:1px solid var(--bordo);border-radius:10px;padding:24px;margin-bottom:16px;max-width:720px}
.d-card h3{font-size:14px;color:var(--oro);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em}
.d-card p{font-size:14px;color:var(--grigio2);line-height:1.6;margin-bottom:12px}

/* PROFILO */
.profile-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px}
.profile-row:last-child{border-bottom:none}
.profile-row .label{color:var(--grigio)}
.profile-row .val{color:var(--bianco);font-weight:500}
.piano-badge{background:var(--oro);color:var(--bg);padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}

/* STATISTICHE */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-mini{background:var(--nero3);border:1px solid var(--bordo);border-radius:6px;padding:14px;text-align:center}
.stat-mini .num{font-size:28px;font-weight:800;color:var(--oro);display:block;line-height:1;margin-bottom:4px}
.stat-mini .lbl{font-size:11px;color:var(--grigio);text-transform:uppercase;letter-spacing:0.05em}

/* TODO BROADCAST */
.todo-empty{color:var(--grigio);font-size:14px;font-style:italic;text-align:center;padding:24px}
.todo-item-broadcast{background:var(--nero3);border:1px solid var(--bordo);border-radius:8px;margin-bottom:8px;overflow:hidden;transition:0.2s}
.todo-item-broadcast.done{border-color:rgba(107,207,127,0.3);background:rgba(107,207,127,0.04)}
.tib-row{display:flex;align-items:center;gap:12px;padding:12px 16px}
.tib-num{background:var(--oro);color:var(--bg);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.tib-check{width:24px;height:24px;border:2px solid var(--grigio);border-radius:5px;flex-shrink:0;cursor:pointer;transition:0.2s;display:flex;align-items:center;justify-content:center}
.tib-check:hover{border-color:var(--oro)}
.todo-item-broadcast.done .tib-check{background:var(--verde);border-color:var(--verde)}
.todo-item-broadcast.done .tib-check::after{content:"✓";color:var(--bg);font-weight:900;font-size:16px}
.tib-txt{flex:1;font-size:14px;color:var(--bianco);line-height:1.5}
.todo-item-broadcast.done .tib-txt{color:var(--grigio);text-decoration:line-through}
.tib-comment-btn{background:rgba(200,169,110,0.1);border:1px solid rgba(200,169,110,0.35);color:var(--oro);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Sans';font-weight:600;flex-shrink:0;transition:0.2s}
.tib-comment-btn:hover{background:var(--oro);color:var(--bg)}
.tib-comments{padding:10px 16px 16px;border-top:1px dashed var(--bordo);background:rgba(0,0,0,0.15)}
.tib-comment{background:var(--nero2);border-left:3px solid #2a2a2a;padding:8px 12px;border-radius:0 5px 5px 0;margin-bottom:6px;font-size:13px}
.tib-comment.mine{border-left-color:var(--oro);background:rgba(200,169,110,0.08)}
.tib-c-head{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--grigio);margin-bottom:4px}
.tib-c-head strong{color:var(--bianco);font-weight:600}
.tib-c-del{background:none;border:none;color:var(--rosso);cursor:pointer;font-size:12px;margin-left:4px;padding:0 4px}
.tib-c-body{color:var(--grigio2);line-height:1.5}
.tib-c-form{display:flex;gap:6px;margin-top:10px}
.tib-c-form input{flex:1;padding:8px 10px;background:var(--bg);border:1px solid #2a2a2a;color:var(--bianco);border-radius:5px;font-family:'DM Sans';font-size:13px}
.tib-c-form input:focus{outline:none;border-color:var(--oro)}
.tib-c-form button{padding:8px 14px;background:var(--oro);color:var(--bg);border:none;border-radius:5px;font-weight:700;cursor:pointer;font-size:12px}

/* CHAT */
.chat-box{height:400px;overflow-y:auto;background:var(--nero3);border:1px solid var(--bordo);border-radius:8px;padding:12px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px}
.msg{padding:10px 14px;border-radius:10px;max-width:80%;font-size:14px;line-height:1.5;word-wrap:break-word}
.msg.mine{align-self:flex-end;background:var(--oro);color:var(--bg)}
.msg.admin{align-self:flex-start;background:#1a1a24;color:var(--bianco);border:1px solid var(--bordo)}
.msg .time{display:block;font-size:11px;opacity:0.6;margin-top:3px}
.chat-input{display:flex;gap:6px}
.chat-input input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid #2a2a2a;color:var(--bianco);border-radius:6px;font-family:'DM Sans';font-size:14px}
.chat-input input:focus{outline:none;border-color:var(--oro)}
.chat-input button{padding:10px 18px;background:var(--oro);color:var(--bg);border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:14px}
.chat-empty{color:var(--grigio);font-style:italic;text-align:center;padding:32px;font-size:14px}

/* ARIA */
.aria-msg{background:var(--nero3);border:1px solid var(--bordo);border-left:3px solid var(--oro);border-radius:6px;padding:14px 16px;margin-bottom:10px}
.aria-msg .am-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.aria-msg .am-caller{font-weight:700;color:var(--bianco);font-size:15px}
.aria-msg .am-caller .num{color:var(--oro);font-weight:600;font-family:monospace;margin-left:6px;font-size:13px}
.aria-msg .am-time{color:var(--grigio);font-size:12px}
.aria-msg .am-trasc{background:rgba(200,169,110,0.06);border:1px solid rgba(200,169,110,0.2);border-radius:4px;padding:10px 12px;font-size:14px;line-height:1.55;color:var(--grigio2);font-style:italic;margin:8px 0}
.aria-msg .am-trasc .q{color:var(--oro);font-style:normal}
.aria-msg audio{width:100%;margin-top:6px;height:38px}
.aria-msg .am-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:10px;flex-wrap:wrap}
.aria-msg .am-meta{font-size:11px;color:var(--grigio)}
.aria-msg .am-del-btn{background:none;border:1px solid rgba(255,107,107,0.35);color:var(--rosso);padding:5px 10px;border-radius:5px;font-size:12px;cursor:pointer;font-family:'DM Sans';font-weight:600;transition:0.2s}
.aria-msg .am-del-btn:hover{background:rgba(255,107,107,0.15)}
.aria-empty{color:var(--grigio);font-style:italic;text-align:center;padding:32px;font-size:14px;background:var(--nero3);border:1px dashed var(--bordo);border-radius:6px}
.aria-notice{background:rgba(200,169,110,0.08);border:1px solid rgba(200,169,110,0.3);border-radius:6px;padding:12px 14px;margin-bottom:16px;font-size:13px;line-height:1.55;color:var(--grigio2)}
.aria-notice strong{color:var(--oro)}
.am-rating{margin-top:10px;padding-top:8px;border-top:1px dashed rgba(255,255,255,0.08)}
.am-rating .lbl{font-size:12px;color:var(--grigio);margin-bottom:6px;display:block}
.am-rating .btns{display:flex;gap:5px;flex-wrap:wrap}
.am-rating button{background:var(--nero3);border:1px solid #2a2a2a;color:var(--grigio2);padding:6px 10px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans';transition:0.2s;min-width:52px}
.am-rating button:hover{border-color:var(--oro);color:var(--bianco)}
.am-rating button.selected{background:var(--oro);color:var(--bg);border-color:var(--oro)}
.am-dl-btn{background:none;border:1px solid rgba(107,207,127,0.35);color:var(--verde);padding:5px 10px;border-radius:5px;font-size:12px;cursor:pointer;font-family:'DM Sans';font-weight:600;text-decoration:none;display:inline-block;transition:0.2s}
.am-dl-btn:hover{background:rgba(107,207,127,0.15)}
.am-expire{font-size:11px;color:var(--rosso);font-weight:500}

/* GUIDA */
.guide-step{background:var(--nero3);border:1px solid var(--bordo);border-radius:8px;padding:16px;margin-bottom:10px}
.guide-step .num{background:var(--oro);color:var(--bg);width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;margin-right:8px}
.guide-step h4{font-size:14px;display:inline;color:var(--bianco)}
.guide-step p{font-size:13px;color:var(--grigio2);margin-top:6px;line-height:1.5}
.playstore-btn{display:inline-block;padding:12px 20px;background:var(--oro);color:var(--bg);text-decoration:none;border-radius:6px;font-weight:700;font-size:14px;margin-top:10px}
.playstore-btn:hover{background:var(--oro2)}

/* PLACEHOLDER */
.soon{background:rgba(200,169,110,0.08);border:1px dashed rgba(200,169,110,0.4);color:var(--oro);padding:16px;border-radius:6px;font-size:14px;text-align:center}

/* MODAL CUSTOM */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:9999}
.modal-box{background:var(--nero2);border:1px solid var(--bordo);border-radius:12px;padding:28px 32px;max-width:380px;width:90%;text-align:center}
.modal-box h4{font-size:16px;color:var(--bianco);margin-bottom:10px}
.modal-box p{font-size:14px;color:var(--grigio2);margin-bottom:20px;line-height:1.5}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btns button{padding:10px 24px;border:none;border-radius:6px;font-family:'DM Sans';font-size:14px;font-weight:700;cursor:pointer;transition:0.15s}
.modal-btns .btn-confirm{background:var(--oro);color:var(--bg)}
.modal-btns .btn-confirm:hover{background:var(--oro2)}
.modal-btns .btn-confirm.danger{background:var(--rosso);color:var(--bianco)}
.modal-btns .btn-confirm.danger:hover{background:#cc2c2c}
.modal-btns .btn-cancel{background:none;border:1px solid var(--bordo);color:var(--grigio)}
.modal-btns .btn-cancel:hover{border-color:var(--grigio);color:var(--bianco)}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{width:60px}
  .sb-logo,.sb-user,.sb-item span.txt{display:none}
  .sb-item{text-align:center;padding:14px 8px;font-size:18px}
  .sb-footer button{font-size:10px;padding:8px}
  .main-content{padding:16px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .chat-box{height:300px}
}
</style>
</head>
<body>

<div class="layout">
  <div class="sidebar">
    <div class="sb-logo">STOPP<span>AI</span></div>
    <div class="sb-user">
      <div class="name" id="sbNome">...</div>
      <div id="sbEmail" style="margin-bottom:4px">...</div>
      <span class="piano" id="sbPiano">FREE</span>
    </div>
    <div class="sb-nav">
      <div class="sb-item active" onclick="showView('checklist')"><span class="txt">🧪 Checklist test</span></div>
      <div class="sb-item" onclick="showView('aria')"><span class="txt">🎙️ Segreteria ARIA</span></div>
      <div class="sb-item" onclick="showView('chat')"><span class="txt">📢 Messaggi</span></div>
      <div class="sb-item" onclick="showView('referral')"><span class="txt">🔗 Referral</span></div>
      <div class="sb-item" onclick="showView('stats')"><span class="txt">📊 Statistiche</span></div>
      <div class="sb-item" onclick="showView('guida')"><span class="txt">📖 Guida</span></div>
      <div class="sb-item" onclick="showView('profilo')" style="margin-top:auto"><span class="txt">👤 Il tuo profilo</span></div>
    </div>
    <div class="sb-footer">
      <button onclick="doLogout()">Esci</button>
    </div>
  </div>

  <div class="main">
    <div class="main-header">
      <h2 id="viewTitle">Checklist test</h2>
      <div id="statoBadge"></div>
    </div>
    <div class="main-content" id="viewContent"></div>
  </div>
</div>

<script>
const API='/api/dashboard';
let me=null;
let pollTimers=[];
const views=['checklist','aria','chat','referral','stats','guida','profilo'];
const titles={checklist:'🧪 Checklist test',aria:'🎙️ Segreteria ARIA',chat:'📢 Messaggi',referral:'🔗 Referral',stats:'📊 Statistiche',guida:'📖 Guida',profilo:'👤 Il tuo profilo'};

function stopPolls(){pollTimers.forEach(t=>clearInterval(t));pollTimers=[]}

function showView(v){
  stopPolls();
  document.querySelectorAll('.sb-item').forEach((el,i)=>{el.classList.toggle('active',views[i]===v)});
  document.getElementById('viewTitle').textContent=titles[v]||v;
  const c=document.getElementById('viewContent');
  c.innerHTML='<div style="color:var(--grigio);padding:40px;text-align:center">Caricamento...</div>';

  if(v==='checklist'){loadChecklist();pollTimers.push(setInterval(loadChecklist,15000))}
  else if(v==='aria'){loadAria();pollTimers.push(setInterval(loadAria,15000))}
  else if(v==='chat'){loadChat();pollTimers.push(setInterval(loadChat,8000))}
  else if(v==='referral')c.innerHTML='<div class="d-card"><h3>🔗 Programma Referral</h3><div class="soon"><strong>A breve</strong><br><span style="font-size:13px;opacity:0.85">Invita amici e guadagna premi. Il programma referral sara\' disponibile nei prossimi giorni.</span></div></div>';
  else if(v==='stats'){loadStats();pollTimers.push(setInterval(loadStats,30000))}
  else if(v==='guida')renderGuida();
  else if(v==='profilo')renderProfilo();
}

// ===== INIT =====
async function init(){
  try{
    const r=await fetch(API+'/me',{credentials:'include'});
    if(!r.ok){window.location.href='/accedi.html';return}
    me=await r.json();
    document.getElementById('sbNome').textContent=me.nome+' '+me.cognome;
    document.getElementById('sbEmail').textContent=me.email;
    document.getElementById('sbPiano').textContent=(me.piano||'free').toUpperCase();
    const label={accettato:'Attivo',in_attesa:'In attesa',rifiutato:'Non accettato'}[me.stato]||me.stato;
    document.getElementById('statoBadge').innerHTML='<span class="stato '+(me.stato||'')+'"><span style="width:8px;height:8px;border-radius:50%;background:currentColor;display:inline-block;margin-right:4px"></span>'+label+'</span>';
    showView('checklist');
    // Refresh profilo ogni 60s
    setInterval(()=>fetch(API+'/me',{credentials:'include'}).then(r=>r.ok?r.json():null).then(d=>{if(d){me=d;document.getElementById('sbPiano').textContent=(me.piano||'free').toUpperCase()}}),60000);
  }catch(e){window.location.href='/accedi.html'}
}

// ===== CHECKLIST =====
async function loadChecklist(){
  const activeInput=document.activeElement;
  if(activeInput&&activeInput.id&&activeInput.id.startsWith('cinput-'))return;
  try{
    const r=await fetch(API+'/test-items',{credentials:'include'});
    if(!r.ok)return;
    const items=await r.json();
    const c=document.getElementById('viewContent');
    if(!items.length){c.innerHTML='<div class="d-card"><div class="todo-empty">Nessun test ancora pubblicato.<br>Il team scrivera\' qui le attivita\' da svolgere.</div></div>';return}
    c.innerHTML='<div class="d-card"><h3>Attivita\' da completare</h3><p style="font-size:13px;margin-bottom:16px">Spunta ogni voce man mano che la completi. Clicca "Commenta" per segnalazioni.</p>'+
      items.map(it=>`
      <div class="todo-item-broadcast ${it.fatto?'done':''}" data-id="${it.id}">
        <div class="tib-row">
          <div class="tib-num">#${it.id}</div>
          <div class="tib-check" onclick="toggleTestItem(${it.id})" title="Segna come completato"></div>
          <div class="tib-txt">${escapeHtml(it.testo)}</div>
          <button class="tib-comment-btn" onclick="toggleComments(${it.id})">💬 ${it.my_comments>0?it.my_comments:'Commenta'}</button>
        </div>
        <div class="tib-comments" id="comments-${it.id}" style="display:none"></div>
      </div>`).join('')+'</div>';
  }catch(e){}
}

async function toggleTestItem(id){
  try{await fetch(API+'/test-items/'+id+'/toggle',{method:'POST',credentials:'include'});loadChecklist()}catch(e){}
}
async function toggleComments(id){
  const box=document.getElementById('comments-'+id);
  if(!box)return;
  if(box.style.display==='block'){box.style.display='none';return}
  box.style.display='block';
  box.innerHTML='<div style="color:var(--grigio);font-size:13px;padding:8px 0">Caricamento...</div>';
  try{const r=await fetch(API+'/test-items/'+id+'/comments',{credentials:'include'});renderComments(id,await r.json())}catch(e){}
}
function renderComments(itemId,comments){
  const box=document.getElementById('comments-'+itemId);
  if(!box)return;
  const list=comments.map(c=>{
    const time=c.timestamp?new Date(c.timestamp.replace(' ','T')).toLocaleString('it-IT',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}):'';
    const delBtn=c.mine?`<button class="tib-c-del" onclick="delComment(${c.id},${itemId})">✕</button>`:'';
    return `<div class="tib-comment ${c.mine?'mine':''}"><div class="tib-c-head"><strong>${escapeHtml(c.nome)}</strong><span>${time}${delBtn}</span></div><div class="tib-c-body">${escapeHtml(c.testo)}</div></div>`;
  }).join('');
  box.innerHTML=`${list||'<div style="color:var(--grigio);font-size:13px;font-style:italic;padding:8px 0">Nessun commento. Scrivi il primo.</div>'}
    <form class="tib-c-form" onsubmit="return addComment(event,${itemId})"><input type="text" id="cinput-${itemId}" placeholder="Scrivi un commento..." maxlength="500" required><button type="submit">Invia</button></form>`;
}
async function addComment(e,itemId){
  e.preventDefault();const input=document.getElementById('cinput-'+itemId);const testo=input.value.trim();if(!testo)return false;
  try{await fetch(API+'/test-items/'+itemId+'/comments',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({testo})});input.value='';
    const r=await fetch(API+'/test-items/'+itemId+'/comments',{credentials:'include'});renderComments(itemId,await r.json());loadChecklist()}catch(e){}
  return false;
}
async function delComment(commentId,itemId){
  try{await fetch(API+'/test-items/comments/'+commentId,{method:'DELETE',credentials:'include'});
    const r=await fetch(API+'/test-items/'+itemId+'/comments',{credentials:'include'});renderComments(itemId,await r.json());loadChecklist()}catch(e){}
}

// ===== ARIA =====
async function loadAria(){
  const playing=Array.from(document.querySelectorAll('#viewContent audio')).some(a=>!a.paused&&!a.ended);
  if(playing)return;
  try{
    const r=await fetch(API+'/aria-messaggi',{credentials:'include'});if(!r.ok)return;
    const msgs=await r.json();const c=document.getElementById('viewContent');
    if(!msgs.length){c.innerHTML='<div class="d-card"><h3>Messaggi segreteria</h3><div class="aria-empty">Nessun messaggio ancora.<br>Quando un numero sconosciuto ti chiamera\', ARIA rispondera\' e il messaggio apparira\' qui.</div></div>';return}
    c.innerHTML='<div class="d-card"><h3>Messaggi segreteria</h3><div class="aria-notice">⏱️ <strong>I messaggi restano disponibili per 24 ore</strong>, poi vengono cancellati. Scarica il file audio prima della scadenza.<br>⭐ <strong>Valuta la fedelta\' della trascrizione</strong>: i tuoi voti ci aiutano a migliorare.</div>'+
      msgs.map(m=>{
        const ts=m.timestamp?new Date(m.timestamp.replace(' ','T')+'Z'):null;
        const time=ts?ts.toLocaleString('it-IT'):'';
        const dur=m.durata_secondi?m.durata_secondi+'s':'—';
        const kb=m.dimensione_kb?m.dimensione_kb.toFixed(1)+' KB':'—';
        const caller=m.caller_name?escapeHtml(m.caller_name):'Sconosciuto';
        const spam=m.spam_score||0;
        const spamColor=spam>=70?'#ff6b6b':spam>=30?'#ffb86c':'#6bcf7f';
        const spamLabel=spam>=70?'🔴 Probabile call center':spam>=30?'🟠 Sospetto':'🟢 Probabilmente legittimo';
        const spamBadge=m.trascrizione?`<span style="color:${spamColor};font-size:12px;font-weight:600">${spamLabel} (${spam}%)</span>`:'';
        const trasc=m.trascrizione?`<div class="am-trasc"><span class="q">"</span>${escapeHtml(m.trascrizione)}<span class="q">"</span></div>`:'<div class="am-trasc" style="opacity:0.6">Trascrizione in elaborazione...</div>';
        const audio=m.wav_filename?`<audio controls preload="none" src="${API}/aria-audio/${m.id}"></audio>`:'';
        const download=m.wav_filename?`<a class="am-dl-btn" href="${API}/aria-download/${m.id}" download>⬇ Scarica</a>`:'';
        let expire='';
        if(ts){const ms=ts.getTime()+24*60*60*1000-Date.now();if(ms>0){const h=Math.floor(ms/(60*60*1000));const mm=Math.floor((ms%(60*60*1000))/(60*1000));expire=`<span class="am-expire">⏱️ tra ${h}h ${mm}m</span>`}}
        const ratingBtns=[100,80,60,40,20].map(v=>`<button class="${m.accuracy_rating===v?'selected':''}" onclick="rateAria(${m.id},${v})">${v}%</button>`).join('');
        const rating=m.trascrizione?`<div class="am-rating"><span class="lbl">Quanto e\' fedele questa trascrizione?</span><div class="btns">${ratingBtns}</div></div>`:'';
        return `<div class="aria-msg"><div class="am-head"><div class="am-caller">${caller}<span class="num">${escapeHtml(m.caller_number||'—')}</span></div><div class="am-time">${time}</div></div>${spamBadge}${trasc}${audio}${rating}<div class="am-footer"><div class="am-meta">Durata: ${dur} · ${kb} ${expire?'· '+expire:''}</div><div style="display:flex;gap:6px;flex-wrap:wrap">${download}<button class="am-del-btn" onclick="deleteAriaMsg(${m.id})">🗑️ Elimina</button></div></div></div>`;
      }).join('')+'</div>';
  }catch(e){}
}
function deleteAriaMsg(id){
  showModal('Eliminare questo messaggio?','Questa operazione e\' definitiva. Il messaggio verra\' cancellato.',async()=>{
    try{const r=await fetch(API+'/aria-messaggi/'+id,{method:'DELETE',credentials:'include'});if(r.ok)loadAria()}catch(e){}
  },'danger');
}
async function rateAria(id,rating){try{const r=await fetch(API+'/aria-messaggi/'+id+'/rating',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({rating})});if(r.ok)loadAria()}catch(e){}}

// ===== CHAT =====
async function loadChat(){
  try{
    const r=await fetch(API+'/chat',{credentials:'include'});if(!r.ok)return;
    const msgs=await r.json();const c=document.getElementById('viewContent');
    const chatHtml=msgs.length?msgs.map(m=>{
      const time=m.timestamp?new Date(m.timestamp.replace(' ','T')).toLocaleString('it-IT',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}):'';
      const mine=m.mittente==='tester';
      return `<div class="msg ${mine?'mine':'admin'}">${escapeHtml(m.testo||'')}<span class="time">${time}</span></div>`;
    }).join(''):'<div class="chat-empty">Nessun messaggio ancora. Scrivi per iniziare.</div>';
    // Preserva scroll position se gia' renderizzato
    const existing=document.querySelector('.chat-box');
    if(existing){
      const wasBottom=existing.scrollTop+existing.clientHeight>=existing.scrollHeight-20;
      existing.innerHTML=chatHtml;
      if(wasBottom)existing.scrollTop=existing.scrollHeight;
    }else{
      c.innerHTML=`<div class="d-card"><h3>Chat con il team</h3><p style="font-size:13px;margin-bottom:12px">Scrivici per qualsiasi segnalazione, bug o domanda.</p><div class="chat-box">${chatHtml}</div><form class="chat-input" onsubmit="return inviaMsg(event)"><input type="text" id="chatTxt" placeholder="Scrivi un messaggio..." maxlength="1000" required><button type="submit">Invia</button></form></div>`;
      const box=document.querySelector('.chat-box');if(box)box.scrollTop=box.scrollHeight;
    }
  }catch(e){}
}
async function inviaMsg(e){
  e.preventDefault();const input=document.getElementById('chatTxt');const testo=input.value.trim();if(!testo)return false;
  input.disabled=true;
  try{const r=await fetch(API+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({testo})});if(r.ok){input.value='';loadChat()}}catch(e){}
  input.disabled=false;input.focus();return false;
}

// ===== STATISTICHE =====
async function loadStats(){
  try{
    const r=await fetch(API+'/stats',{credentials:'include'});if(!r.ok)return;
    const s=await r.json();
    const spam=(s.sconosciuti_mobile_non_risposti||0)+(s.sconosciuti_fissi_non_risposti||0)+(s.privati_non_risposti||0);
    const aria=(s.sconosciuti_mobile_segreteria||0)+(s.sconosciuti_fissi_segreteria||0)+(s.privati_segreteria||0);
    const msg=(s.sconosciuti_mobile_msg_lasciato||0)+(s.sconosciuti_fissi_msg_lasciato||0)+(s.privati_msg_lasciato||0);
    const sync=s.ultimo_sync?'Ultimo aggiornamento: '+new Date(s.ultimo_sync.replace(' ','T')).toLocaleString('it-IT'):'L\'app non ha ancora inviato statistiche.';
    document.getElementById('viewContent').innerHTML=`
      <div class="d-card"><h3>Le tue statistiche</h3>
        <div class="stats-grid">
          <div class="stat-mini"><span class="num">${s.chiamate_totali||0}</span><span class="lbl">Chiamate totali</span></div>
          <div class="stat-mini"><span class="num">${s.chiamate_oggi||0}</span><span class="lbl">Oggi</span></div>
          <div class="stat-mini"><span class="num">${spam}</span><span class="lbl">Spam silenziati</span></div>
          <div class="stat-mini"><span class="num">${s.sconosciuti_mobile_sms||0}</span><span class="lbl">SMS inviati</span></div>
          <div class="stat-mini"><span class="num">${aria}</span><span class="lbl">ARIA risposte</span></div>
          <div class="stat-mini"><span class="num">${msg}</span><span class="lbl">Messaggi ricevuti</span></div>
        </div>
        <p style="font-size:12px;color:var(--grigio);text-align:center;margin-top:12px">${sync}</p>
      </div>`;
  }catch(e){}
}

// ===== PROFILO =====
function renderProfilo(){
  const dataIscr=me.data_iscrizione?new Date(me.data_iscrizione.replace(' ','T')).toLocaleDateString('it-IT'):'—';
  const dataAcc=me.data_accettazione?new Date(me.data_accettazione.replace(' ','T')).toLocaleDateString('it-IT'):'—';

      <div class="profile-row"><span class="label">Telefono</span><span class="val">${escapeHtml(me.telefono||'—')}</span></div>
      <div class="profile-row"><span class="label">Piano attuale</span><span class="val"><span class="piano-badge">${(me.piano||'free').toUpperCase()}</span></span></div>

    </div>`;
}

// ===== UTILS =====
async function doLogout(){try{await fetch(API+'/logout',{method:'POST',credentials:'include'})}catch(e){}window.location.href='/'}

function showModal(titolo,testo,onConfirm,tipo){
  const overlay=document.createElement('div');overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal-box"><h4>${titolo}</h4><p>${testo}</p><div class="modal-btns"><button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">Annulla</button><button class="btn-confirm ${tipo||''}" id="modalConfirmBtn">Conferma</button></div></div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove()});
  document.getElementById('modalConfirmBtn').onclick=()=>{overlay.remove();if(onConfirm)onConfirm()};
}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

init();
