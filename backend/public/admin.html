<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoppAI Admin CRM</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0a0f;--card:#12121a;--card2:#16161f;--oro:#c8a96e;--verde:#4CAF50;--rosso:#e53935;--grigio:#888;--bianco:#f5f3ee;--bordo:#1e1e1e;--viola:#7c4dff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--bianco);overflow:hidden;height:100vh}

/* LOGIN */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:999}
.login-box{background:var(--card);border:1px solid var(--bordo);border-radius:12px;padding:40px;width:340px;text-align:center}
.login-box h2{color:var(--oro);margin-bottom:20px;font-size:22px;letter-spacing:2px}
.login-box input{width:100%;padding:12px;background:#1a1a24;border:1px solid var(--bordo);color:var(--bianco);border-radius:6px;margin-bottom:12px}
.login-box button{width:100%;padding:12px;background:var(--oro);color:var(--bg);border:none;border-radius:6px;font-weight:bold;cursor:pointer}
#loginErr{color:var(--rosso);margin-top:10px;font-size:13px;display:none}

/* LAYOUT CRM */
#app{display:none;height:100vh}
.layout{display:flex;height:100%}

/* SIDEBAR */
.sidebar{width:200px;background:var(--card);border-right:1px solid var(--bordo);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:20px 16px;border-bottom:1px solid var(--bordo);font-size:16px;font-weight:800;letter-spacing:2px}
.sb-logo span{color:var(--oro)}
.sb-nav{flex:1;padding:12px 0}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;color:var(--grigio);transition:.2s}
.sb-item:hover,.sb-item.active{color:var(--bianco);background:rgba(200,169,110,.08)}
.sb-item.active{border-left:3px solid var(--oro);color:var(--oro)}
.sb-footer{padding:16px;border-top:1px solid var(--bordo);font-size:11px;color:#444}

/* AREA PRINCIPALE */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:16px 24px;border-bottom:1px solid var(--bordo);display:flex;align-items:center;justify-content:space-between}
.topbar h2{font-size:16px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:24px}

/* STATS */
.stats{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--bordo);border-radius:8px;padding:16px 20px;text-align:center;min-width:90px;flex:1}
.stat .n{font-size:24px;font-weight:bold;color:var(--oro)}
.stat .label{font-size:10px;color:var(--grigio);margin-top:4px;text-transform:uppercase}

/* TABELLA TESTER */
.tester-list{width:100%}
.t-row{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--bordo);cursor:pointer;transition:.15s;gap:12px}
.t-row:hover{background:rgba(200,169,110,.05)}
.t-row.selected{background:rgba(200,169,110,.1);border-left:3px solid var(--oro)}
.t-avatar{width:36px;height:36px;border-radius:50%;background:var(--card2);border:1px solid var(--bordo);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;color:var(--oro);flex-shrink:0}
.t-info{flex:1;min-width:0}
.t-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-email{font-size:11px;color:var(--grigio)}
.badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:bold;text-transform:uppercase}
.b-attesa{background:#ff980020;color:#ff9800}.b-accettato{background:#4caf5020;color:#4caf50}.b-rifiutato{background:#e5393520;color:#e53935}
.b-free{background:#78909c20;color:#78909c}.b-pro{background:#c8a96e20;color:var(--oro)}.b-shield{background:#7c4dff20;color:var(--viola)}

/* SCHEDA TESTER */
.detail-view{display:none;height:100%}
.detail-layout{display:flex;height:100%;gap:0}
.detail-left{width:320px;border-right:1px solid var(--bordo);overflow-y:auto;padding:24px;flex-shrink:0}
.detail-right{flex:1;display:flex;flex-direction:column;overflow:hidden}

.field{margin-bottom:16px}
.field label{display:block;font-size:11px;color:var(--grigio);margin-bottom:4px;text-transform:uppercase}
.field-val{font-size:14px}
.field select,.field textarea{width:100%;background:#1a1a24;color:var(--bianco);border:1px solid var(--bordo);border-radius:4px;padding:8px;font-size:13px}
.field textarea{resize:vertical;min-height:60px}

.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600}
.btn-oro{background:var(--oro);color:var(--bg)}.btn-red{background:none;border:1px solid var(--rosso);color:var(--rosso)}
.btn-red:hover{background:var(--rosso);color:#fff}
.btn-ghost{background:none;border:1px solid var(--bordo);color:var(--grigio)}.btn-ghost:hover{color:var(--bianco)}

/* TABS pannello dx */
.tabs{display:flex;border-bottom:1px solid var(--bordo)}
.tab{padding:10px 16px;cursor:pointer;font-size:12px;color:var(--grigio);border-bottom:2px solid transparent}
.tab:hover{color:var(--bianco)}
.tab.active{color:var(--oro);border-bottom-color:var(--oro)}
.tab-content{flex:1;overflow-y:auto;padding:16px}

/* CHAT */
.chat-msgs{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.msg{max-width:80%;padding:8px 12px;border-radius:8px;font-size:13px;line-height:1.5}
.msg-admin{background:var(--oro);color:var(--bg);align-self:flex-end;border-bottom-right-radius:2px}
.msg-tester{background:var(--card2);border:1px solid var(--bordo);align-self:flex-start;border-bottom-left-radius:2px}
.msg-time{font-size:10px;opacity:.6;margin-top:2px}
.chat-input{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--bordo)}
.chat-input input{flex:1;background:#1a1a24;border:1px solid var(--bordo);color:var(--bianco);padding:8px 12px;border-radius:6px;font-size:13px}
.chat-input button{padding:8px 16px;background:var(--oro);color:var(--bg);border:none;border-radius:6px;font-weight:bold;cursor:pointer}

/* NOTE */
.note-item{background:var(--card2);border:1px solid var(--bordo);border-radius:6px;padding:10px;margin-bottom:8px;position:relative}
.note-item .del{position:absolute;top:6px;right:8px;cursor:pointer;color:var(--rosso);font-size:12px;opacity:.6}
.note-item .del:hover{opacity:1}
.note-item .time{font-size:10px;color:var(--grigio);margin-top:4px}
.add-row{display:flex;gap:8px;margin-top:12px}
.add-row input,.add-row textarea{flex:1;background:#1a1a24;border:1px solid var(--bordo);color:var(--bianco);padding:8px;border-radius:4px;font-size:13px}
.add-row button{padding:8px 14px;background:var(--oro);color:var(--bg);border:none;border-radius:4px;font-weight:bold;cursor:pointer;white-space:nowrap}

/* TODO */
.todo-item{display:flex;align-items:center;gap:8px;padding:8px;border-bottom:1px solid var(--bordo)}
.todo-item input[type=checkbox]{accent-color:var(--oro);width:16px;height:16px;cursor:pointer}
.todo-item.done span{text-decoration:line-through;color:var(--grigio)}
.todo-item .del{margin-left:auto;cursor:pointer;color:var(--rosso);font-size:12px;opacity:.5}
.todo-item .del:hover{opacity:1}

/* DASHBOARD STATS */
.dash-grid{display:grid;gap:14px;margin-bottom:14px}
.dash-2{grid-template-columns:repeat(2,1fr)}
.dash-3{grid-template-columns:repeat(3,1fr)}
.dash-4{grid-template-columns:repeat(4,1fr)}
.dash-widget{background:var(--card);border:1px solid var(--bordo);border-radius:12px;padding:20px;position:relative;overflow:hidden}
.dash-widget::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.dash-widget.w-oro::before{background:var(--oro)}
.dash-widget.w-verde::before{background:var(--verde)}
.dash-widget.w-blu::before{background:#42a5f5}
.dash-widget.w-rosso::before{background:var(--rosso)}
.dash-widget.w-viola::before{background:var(--viola)}
.w-title{font-size:11px;color:var(--grigio);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-weight:600}
.w-value{font-size:28px;font-weight:800;margin-bottom:2px}
.w-sub{font-size:11px;color:var(--grigio)}
.w-span2{grid-column:span 2}

/* MODAL CUSTOM */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:modalFadeIn .2s}
@keyframes modalFadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--card);border:1px solid var(--bordo);border-radius:14px;width:380px;max-width:90vw;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:modalSlide .25s}
@keyframes modalSlide{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.modal-header{padding:20px 24px 0;display:flex;align-items:center;gap:10px}
.modal-header .icon{font-size:24px}
.modal-header .title{font-size:16px;font-weight:700;color:var(--bianco)}
.modal-body{padding:12px 24px 20px;font-size:14px;color:#ccc;line-height:1.6}
.modal-body input,.modal-body textarea{width:100%;background:#1a1a24;border:1px solid var(--bordo);color:var(--bianco);padding:10px;border-radius:6px;font-size:14px;margin-top:8px}
.modal-footer{padding:0 24px 20px;display:flex;gap:10px;justify-content:flex-end}
.modal-btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
.modal-btn-cancel{background:none;border:1px solid var(--bordo);color:var(--grigio)}
.modal-btn-cancel:hover{color:var(--bianco);border-color:var(--grigio)}
.modal-btn-danger{background:var(--rosso);color:#fff}
.modal-btn-danger:hover{background:#c62828}
.modal-btn-ok{background:var(--oro);color:var(--bg)}
.modal-btn-ok:hover{background:#b8963e}

/* ARIA MESSAGGI */
.aria-item{background:var(--card);border:1px solid var(--bordo);border-radius:10px;padding:16px;margin-bottom:12px}
.aria-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.aria-caller{font-size:14px;font-weight:600}
.aria-caller-name{color:var(--oro)}
.aria-caller-num{color:var(--grigio);font-size:12px;margin-left:8px}
.aria-date{font-size:11px;color:var(--grigio)}
.aria-wav{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;color:var(--grigio)}
.aria-wav audio{height:32px;flex:1}
.aria-trascrizione{background:var(--card2);border:1px solid var(--bordo);border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.6;color:#b8e6b8;font-style:italic}
.aria-empty{text-align:center;padding:40px;color:var(--grigio)}
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <h2>STOPP<span style="color:var(--bianco)">AI</span></h2>
    <p style="color:var(--grigio);margin-bottom:20px;font-size:13px">Admin CRM</p>
    <div id="loginStep1">
      <input type="email" id="adminEmail" placeholder="La tua email" onkeydown="if(event.key==='Enter')requestAdminCode()">
      <button onclick="requestAdminCode()">INVIA CODICE</button>
    </div>
    <div id="loginStep2" style="display:none">
      <p style="color:var(--verde);margin-bottom:16px;font-size:13px" id="codeMsg">Codice inviato!</p>
      <input type="text" id="adminCode" placeholder="Codice a 6 cifre" maxlength="6" style="text-align:center;font-size:20px;letter-spacing:6px" onkeydown="if(event.key==='Enter')doLoginCode()">
      <button onclick="doLoginCode()">ACCEDI</button>
      <p style="margin-top:12px"><a href="#" onclick="document.getElementById('loginStep1').style.display='block';document.getElementById('loginStep2').style.display='none';return false" style="color:var(--grigio);font-size:12px">← Torna indietro</a></p>
    </div>
    <p id="loginErr"></p>
  </div>
</div>

<div id="app">
  <div class="layout">
    <div class="sidebar">
      <div class="sb-logo">STOPP<span>AI</span></div>
      <div style="text-align:center;padding:4px 12px;margin:-4px 12px 8px;background:linear-gradient(135deg,#c8a96e,#b8944e);border-radius:6px;font-size:11px;font-weight:700;color:#1a1a2e;letter-spacing:0.1em">🛡️ SUPER ADMIN</div>
      <div class="sb-nav">
        <div class="sb-item active" onclick="showView('dashboard')">📊 Dashboard</div>
        <div class="sb-item" onclick="showView('testers')">👥 Tester</div>
        <div class="sb-item" onclick="showView('broadcast')">📢 Comunicazioni</div>
        <div class="sb-item" onclick="showView('testitems')">🧪 Test TO-DO</div>
        <div class="sb-item" onclick="showView('referral')">🔗 Referral</div>
        <div class="sb-item" onclick="showView('links')">🛡️ Link pericolosi</div>
      </div>
      <div class="sb-footer">StoppAI Super Admin v1.1</div>
    </div>
    <div class="main">
      <div class="topbar">
        <h2 id="viewTitle">Dashboard</h2>
        <button class="btn btn-ghost" onclick="doLogout()">Logout</button>
      </div>
      <div class="content" id="viewContent"></div>
    </div>
  </div>
</div>

<script>
const API='/api/admin';
let testers=[], currentTester=null, currentTab='chat';

// --- MODAL SYSTEM ---
function showModal({icon,title,message,type,inputDefault,onConfirm,onCancel,confirmLabel}){
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  const isDanger=type==='danger';
  const isPrompt=type==='prompt';
  const isAlert=type==='alert';
  overlay.innerHTML=`<div class="modal-box">
    <div class="modal-header"><span class="icon">${icon||'⚠️'}</span><span class="title">${title||'Conferma'}</span></div>
    <div class="modal-body">${message||''}${isPrompt?`<textarea id="modalInput" rows="3">${inputDefault||''}</textarea>`:''}</div>
    <div class="modal-footer">
      ${isAlert?'':`<button class="modal-btn modal-btn-cancel" id="modalCancel">Annulla</button>`}
      <button class="modal-btn ${isDanger?'modal-btn-danger':'modal-btn-ok'}" id="modalOk">${confirmLabel||(isDanger?'Elimina':isAlert?'OK':'Conferma')}</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  const ok=overlay.querySelector('#modalOk');
  const cancel=overlay.querySelector('#modalCancel');
  const inp=overlay.querySelector('#modalInput');
  if(inp)setTimeout(()=>inp.focus(),100);
  ok.onclick=()=>{overlay.remove();if(onConfirm)onConfirm(inp?inp.value:true)};
  if(cancel)cancel.onclick=()=>{overlay.remove();if(onCancel)onCancel()};
  overlay.onclick=e=>{if(e.target===overlay){overlay.remove();if(onCancel)onCancel()}};
}

// --- AUTH ---
// Login con password rimosso dalla UI — solo magic code

async function requestAdminCode(){
  const email=document.getElementById('adminEmail').value.trim();
  if(!email||!email.includes('@')){document.getElementById('loginErr').textContent='Inserisci un\'email valida';document.getElementById('loginErr').style.display='block';return}
  const r=await fetch(API+'/request-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
  const d=await r.json();
  if(r.ok){
    document.getElementById('loginStep1').style.display='none';
    document.getElementById('loginStep2').style.display='block';
    document.getElementById('codeMsg').textContent=d.message||'Codice inviato!';
    document.getElementById('loginErr').style.display='none';
  } else {
    document.getElementById('loginErr').textContent=d.error||'Email non autorizzata';document.getElementById('loginErr').style.display='block';
  }
}
async function doLoginCode(){
  const codice=document.getElementById('adminCode').value.trim();
  if(codice.length!==6)return;
  const r=await fetch(API+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({codice})});
  if(r.ok){document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';showView('dashboard')}
  else{document.getElementById('loginErr').textContent='Codice non valido';document.getElementById('loginErr').style.display='block'}
}
async function doLogout(){
  try{await fetch(API+'/logout',{method:'POST',credentials:'include'})}catch(e){}
  window.location.href='/';
}
// Al caricamento: se cookie admin valido → mostra app; altrimenti redirect a /accedi.html
fetch(API+'/stats',{credentials:'include'}).then(r=>{
  if(r.ok){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    showView('dashboard');
  } else {
    // non autenticato → manda al punto di ingresso pubblico
    window.location.href='/accedi.html';
  }
}).catch(()=>{ window.location.href='/accedi.html'; });

// --- VIEWS ---
let dashboardPollTimer=null,testItemsPollTimer=null,testerListPollTimer=null;
function stopAllViewPolls(){
  if(dashboardPollTimer){clearInterval(dashboardPollTimer);dashboardPollTimer=null}
  if(testItemsPollTimer){clearInterval(testItemsPollTimer);testItemsPollTimer=null}
  if(testerListPollTimer){clearInterval(testerListPollTimer);testerListPollTimer=null}
}
function showView(v){
  stopChatPoll();stopAriaPoll();stopAllViewPolls();
  document.querySelectorAll('.sb-item').forEach((el,i)=>{el.classList.toggle('active',['dashboard','testers','broadcast','testitems','referral','links'][i]===v)});
  currentTester=null;
  if(v==='dashboard'){loadDashboard();dashboardPollTimer=setInterval(loadDashboard,15000)}
  else if(v==='testers'){loadTesterList();testerListPollTimer=setInterval(loadTesterList,15000)}
  else if(v==='broadcast')loadBroadcast();
  else if(v==='testitems'){loadTestItems();testItemsPollTimer=setInterval(loadTestItems,20000)}
  else if(v==='referral')document.getElementById('viewContent').innerHTML='<p style="color:var(--grigio);padding:40px;text-align:center">Gestione Referral — in arrivo</p>';
  else if(v==='links')document.getElementById('viewContent').innerHTML='<p style="color:var(--grigio);padding:40px;text-align:center">Gestione Link e messaggi pericolosi — in arrivo</p>';
  document.getElementById('viewTitle').textContent={dashboard:'Dashboard',testers:'Tester',broadcast:'Comunicazioni',testitems:'Test TO-DO (broadcast)',referral:'Referral',links:'Link pericolosi'}[v];
}

// --- DASHBOARD ---
async function loadDashboard(){
  const s=await(await fetch(API+'/stats')).json();
  const acc=await(await fetch(API+'/aria-accuracy')).json();
  let ucData={totale:0,ultimi7gg:0,per_feature:[],recenti:[]};
  try{ucData=await(await fetch(API+'/upgrade-clicks')).json()}catch(e){}
  const avg=acc.avg_rating!==null?acc.avg_rating+'%':'—';
  const color=acc.avg_rating===null?'var(--grigio)':(acc.avg_rating>=80?'var(--verde)':(acc.avg_rating>=60?'var(--oro)':'var(--rosso)'));
  const max=Math.max(1,acc.distribution[100],acc.distribution[80],acc.distribution[60],acc.distribution[40],acc.distribution[20]);
  const bar=(n,v,col)=>`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px">
      <div style="width:34px;color:var(--grigio);text-align:right">${n}%</div>
      <div style="flex:1;background:#1a1a24;border-radius:3px;height:14px;overflow:hidden"><div style="width:${v/max*100}%;background:${col};height:100%"></div></div>
      <div style="width:28px;color:var(--bianco);font-weight:600">${v}</div>
    </div>`;
  document.getElementById('viewContent').innerHTML=`
    <div class="stats">
      <div class="stat"><div class="n">${s.totale}</div><div class="label">Totale</div></div>
      <div class="stat"><div class="n">${s.inAttesa}</div><div class="label">In attesa</div></div>
      <div class="stat"><div class="n">${s.accettati}</div><div class="label">Accettati</div></div>
      <div class="stat"><div class="n">${s.piani.shield}</div><div class="label">Shield</div></div>
      <div class="stat"><div class="n">${s.piani.pro}</div><div class="label">Pro</div></div>
      <div class="stat"><div class="n">${s.piani.free}</div><div class="label">Free</div></div>
    </div>

    <div style="margin-top:24px;background:var(--card);border:1px solid var(--bordo);border-radius:8px;padding:20px;max-width:560px">
      <h3 style="color:var(--oro);font-size:13px;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em">🎙️ Qualità trascrizione ARIA</h3>
      <div style="display:flex;align-items:center;gap:20px;margin-bottom:14px">
        <div>
          <div style="font-size:34px;font-weight:800;color:${color};line-height:1">${avg}</div>
          <div style="font-size:11px;color:var(--grigio);margin-top:2px">Media fedeltà</div>
        </div>
        <div style="flex:1">
          <div style="font-size:13px;color:var(--bianco)">${acc.rated} valutazioni</div>
          <div style="font-size:11px;color:var(--grigio);margin-top:2px">su ${acc.total_messages} messaggi totali</div>
        </div>
      </div>
      ${acc.rated>0?`
      <div style="margin-top:16px">
        ${bar(100,acc.distribution[100],'var(--verde)')}
        ${bar(80,acc.distribution[80],'#9bdf9b')}
        ${bar(60,acc.distribution[60],'var(--oro)')}
        ${bar(40,acc.distribution[40],'#ffb86c')}
        ${bar(20,acc.distribution[20],'var(--rosso)')}
      </div>`:'<div style="color:var(--grigio);font-size:12px;font-style:italic;text-align:center;padding:10px">Nessuna valutazione ancora. I tester possono votare la fedeltà delle trascrizioni dalla loro dashboard.</div>'}
    </div>

async function loadTesterList(){
  // se sono dentro una scheda tester (openTester), non rimpiazzare il contenuto
  if(currentTester)return;
  testers=await(await fetch(API+'/testers')).json();
  const accettati=testers.filter(t=>t.stato==='accettato').length;
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap">
    <div style="font-size:13px;color:var(--grigio)">${testers.length} tester totali · <b style="color:var(--verde)">${accettati} accettati</b></div>
    <button class="btn btn-oro" onclick="exportTestersCsv()" ${accettati===0?'disabled style="opacity:0.5;cursor:not-allowed"':''}>⬇ Esporta CSV accettati</button>
  </div>
  <div class="tester-list">`;
  testers.forEach(t=>{
    h+=`<div class="t-row" onclick="openTester(${t.id})">
      <div class="t-avatar">${t.nome[0]}${t.cognome[0]}</div>
      <div class="t-info"><div class="t-name">${t.nome} ${t.cognome}</div><div class="t-email">${t.email}</div></div>
      <span class="badge b-${t.stato}">${t.stato.replace('_',' ')}</span>
      <span class="badge b-${t.piano}">${t.piano}</span>
    </div>`;
  });
  h+='</div>';
  document.getElementById('viewContent').innerHTML=h;
}

async function exportTestersCsv(){
  try {
    const r=await fetch(API+'/testers/export.csv',{credentials:'include'});
    if(!r.ok){alert('Errore export: '+r.status);return}
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`stoppai-testers-accettati-${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a);a.click();a.remove();
    URL.revokeObjectURL(url);
  }catch(e){alert('Errore: '+e.message)}
}

let ariaPollTimer=null;
function startAriaPoll(id){stopAriaPoll();ariaPollTimer=setInterval(()=>{const p=document.getElementById('tabPanel');if(p&&currentTab==='aria')loadAria(id,p)},5000)}
function stopAriaPoll(){if(ariaPollTimer){clearInterval(ariaPollTimer);ariaPollTimer=null}}

async function loadAria(id,panel){
  // Se c'è un audio in riproduzione, salta il refresh per non interromperlo
  const playing=Array.from(panel.querySelectorAll('audio')).some(a=>!a.paused&&!a.ended);
  if(playing)return;
  const msgs=await(await fetch(API+'/testers/'+id+'/aria')).json();
  if(!msgs.length){
    panel.innerHTML='<div class="aria-empty"><div style="font-size:40px;margin-bottom:12px">🎙️</div><p>Nessun messaggio ARIA registrato per questo tester.</p></div>';
    return;
  }
  panel.innerHTML=`<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn btn-red" style="font-size:11px;padding:4px 10px" onclick="clearAllAria(${id})">Cancella tutti i messaggi ARIA</button></div>`+msgs.map(m=>{
    const nome=m.caller_name?`<span class="aria-caller-name">${m.caller_name}</span><span class="aria-caller-num">${m.caller_number}</span>`:`<span class="aria-caller-name">${m.caller_number}</span>`;
    const data=m.timestamp?.replace('T',' ').slice(0,16)||'';
    const info=[];
    if(m.wav_filename)info.push(m.wav_filename);
    if(m.dimensione_kb)info.push('Peso: '+m.dimensione_kb.toFixed(1)+' KB');
    if(m.durata_secondi)info.push('Durata: '+m.durata_secondi+'s');
    return `<div class="aria-item">
      <div class="aria-header">
        <div class="aria-caller">Chi: ${nome}</div>
        <div class="aria-date">${data}</div>
      </div>
      ${info.length?`<div class="aria-wav">${info.join(' | ')}</div>`:''}
      ${m.wav_filename?`<audio controls preload="none" src="${API}/aria-audio/${m.id}" style="width:100%;margin-top:6px;height:34px"></audio>`:''}
      ${m.trascrizione?`<div class="aria-trascrizione">🗨️ ${m.trascrizione}</div>`:'<div class="aria-trascrizione" style="color:var(--grigio)">Nessuna trascrizione disponibile</div>'}
      <div style="text-align:right;margin-top:8px"><span style="font-size:11px;cursor:pointer;color:var(--rosso);opacity:.5" onclick="delAria(${m.id},${id})">Elimina</span></div>
    </div>`;
  }).join('');
}
function delAria(msgId,testerId){showModal({icon:'🗑️',title:'Elimina messaggio',message:'Eliminare questo messaggio ARIA?',type:'danger',onConfirm:async()=>{await fetch(API+'/aria/'+msgId,{method:'DELETE'});loadAria(testerId,document.getElementById('tabPanel'))}})}
function clearAllAria(testerId){showModal({icon:'⚠️',title:'Cancella tutto',message:'Cancellare <strong>TUTTI</strong> i messaggi ARIA di questo tester? Questa azione non può essere annullata.',type:'danger',onConfirm:async()=>{await fetch(API+'/testers/'+testerId+'/aria',{method:'DELETE'});loadAria(testerId,document.getElementById('tabPanel'))}})}

// --- AZIONI ---
function markDirty(){
  const s=document.getElementById('editStato'),p=document.getElementById('editPiano'),sc=document.getElementById('editScadenza'),b=document.getElementById('btnSalvaTester');
  if(!s||!p||!b)return;
  const adm=document.getElementById('editAdmin');
  const dirty=s.value!==s.dataset.original||p.value!==p.dataset.original||(sc&&sc.value!==(sc.dataset.original||''))||(adm&&String(adm.checked?1:0)!==(adm.dataset.original||'0'));
  b.disabled=!dirty;
  b.style.opacity=dirty?'1':'0.5';
  b.style.cursor=dirty?'pointer':'not-allowed';
}
async function salvaTester(id){
  const s=document.getElementById('editStato').value,p=document.getElementById('editPiano').value;
  const sc=document.getElementById('editScadenza')?.value||'';
  const adm=document.getElementById('editAdmin')?.checked?1:0;
  const origS=document.getElementById('editStato').dataset.original,origP=document.getElementById('editPiano').dataset.original;
  const origAdm=document.getElementById('editAdmin')?.dataset.original||'0';
  const b=document.getElementById('btnSalvaTester');
  b.disabled=true;b.textContent='Salvataggio...';
  try{
    if(s!==origS){
      const r=await fetch(API+'/testers/'+id+'/stato',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({stato:s})});
      if(!r.ok)throw new Error('Errore stato');
    }
    if(p!==origP||sc){
      const r=await fetch(API+'/testers/'+id+'/piano',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({piano:p,scadenza:sc||null})});
      if(!r.ok)throw new Error('Errore piano');
    }
    if(String(adm)!==origAdm){
      const r=await fetch(API+'/testers/'+id+'/admin',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({is_admin:adm})});
      if(!r.ok)throw new Error('Errore admin');
    }
    showToast('✓ Modifiche salvate','success');
    openTester(id);
  }catch(e){
    showToast('✗ '+e.message,'error');
    b.disabled=false;b.textContent='💾 Salva modifiche';
  }
}
function showToast(msg,type){
  let t=document.getElementById('adminToast');
  if(!t){t=document.createElement('div');t.id='adminToast';document.body.appendChild(t)}
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:24px;right:24px;padding:14px 22px;border-radius:8px;font-size:14px;font-weight:600;z-index:10000;box-shadow:0 4px 20px rgba(0,0,0,0.5);animation:slideIn 0.25s ease-out;'+(type==='error'?'background:#3a1212;color:#ff9b9b;border:1px solid #ff6b6b':'background:#0f2a15;color:#9bdf9b;border:1px solid #6bcf7f');
  t.style.display='block';
  clearTimeout(t._h);
  t._h=setTimeout(()=>{t.style.display='none'},3500);
}

// CHAT con polling
let chatPollTimer=null;
function startChatPoll(id){
  stopChatPoll();
  chatPollTimer=setInterval(()=>refreshChat(id),3000);
}
function stopChatPoll(){if(chatPollTimer){clearInterval(chatPollTimer);chatPollTimer=null}}
async function refreshChat(id){
  if(currentTab!=='chat'||!currentTester)return;
  const msgs=await(await fetch(API+'/testers/'+id+'/messaggi')).json();
  const panel=document.getElementById('tabPanel');
  if(!panel)return;
  panel.innerHTML=`<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="btn btn-red" style="font-size:11px;padding:4px 10px" onclick="clearChat(${id})">Cancella tutta la chat</button></div><div class="chat-msgs">`+
    msgs.map(m=>{
      const img=m.immagine?`<img src="${m.immagine}" style="max-width:200px;border-radius:8px;margin-top:6px;cursor:pointer" onclick="window.open('${m.immagine}')">`:''
      return `<div class="msg msg-${m.mittente}" style="position:relative;group">
        <div>${m.testo}</div>${img}
        <div class="msg-time">${m.timestamp?.slice(11,16)||''}
          <span style="margin-left:8px;cursor:pointer;opacity:.5" onclick="editMsg(${m.id},${id})" title="Modifica">✏️</span>
          <span style="cursor:pointer;opacity:.5" onclick="deleteMsg(${m.id},${id})" title="Elimina">🗑️</span>
        </div>
      </div>`}).join('')+'</div>';
  panel.scrollTop=panel.scrollHeight;
}
async function sendMsg(id){const inp=document.getElementById('chatMsg');const t=inp.value.trim();if(!t)return;inp.value='';await fetch(API+'/testers/'+id+'/messaggi',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({testo:t})});refreshChat(id)}
function deleteMsg(msgId,testerId){showModal({icon:'🗑️',title:'Elimina messaggio',message:'Eliminare questo messaggio dalla chat?',type:'danger',onConfirm:async()=>{await fetch(API+'/messaggi/'+msgId,{method:'DELETE'});refreshChat(testerId)}})}
function editMsg(msgId,testerId){showModal({icon:'✏️',title:'Modifica messaggio',message:'Scrivi il nuovo testo:',type:'prompt',onConfirm:async(val)=>{if(!val||!val.trim())return;await fetch(API+'/messaggi/'+msgId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({testo:val.trim()})});refreshChat(testerId)}})}
function clearChat(testerId){showModal({icon:'⚠️',title:'Cancella chat',message:'Cancellare <strong>TUTTA</strong> la chat con questo tester?',type:'danger',onConfirm:async()=>{await fetch(API+'/testers/'+testerId+'/chat',{method:'DELETE'});refreshChat(testerId)}})}
async function sendImg(testerId,input){if(!input.files[0])return;const fd=new FormData();fd.append('immagine',input.files[0]);fd.append('testo','');const r=await fetch(API+'/testers/'+testerId+'/messaggi/img',{method:'POST',body:fd});if(r.ok)refreshChat(testerId);input.value=''}

let currentChart=null;
let cachedStats={};
async function showChartView(type,id){
  if(!cachedStats[id]){const r=await fetch(API+'/testers/'+id+'/stats');cachedStats[id]=r.ok?await r.json():{}}
  const s=cachedStats[id];const sc=v=>v||0;
  const chartArea=document.getElementById('chartArea');
  const tableArea=document.getElementById('tableArea');
  if(type==='table'){chartArea.style.display='none';tableArea.style.display='block';return}
  chartArea.style.display='block';tableArea.style.display='none';
  if(currentChart){currentChart.destroy();currentChart=null}
  const canvas=document.getElementById('statsChart');
  const ctx=canvas.getContext('2d');
  Chart.defaults.color='#888';
  if(type==='pie'){
    currentChart=new Chart(ctx,{type:'doughnut',data:{
      labels:['Conosciuti','Scon. Mobile','Scon. Fisso','Privati'],
      datasets:[{data:[sc(s.conosciuti_non_risposti),sc(s.sconosciuti_mobile_non_risposti),sc(s.sconosciuti_fissi_non_risposti),sc(s.privati_non_risposti)],
        backgroundColor:['#4CAF50','#c8a96e','#42a5f5','#e53935'],
        borderColor:'#0a0a0f',borderWidth:3}]
    },options:{responsive:true,plugins:{legend:{position:'bottom',labels:{padding:16,font:{size:12},usePointStyle:true,pointStyle:'circle'}},
      title:{display:true,text:'Distribuzione chiamate non risposte oggi',color:'#c8a96e',font:{size:14}}},
      cutout:'55%'}})
  } else if(type==='bar'){
    currentChart=new Chart(ctx,{type:'bar',data:{
      labels:['Non risposti','SMS','Segreteria','Msg lasciato','Nessun msg'],
      datasets:[
        {label:'Mobile',data:[sc(s.sconosciuti_mobile_non_risposti),sc(s.sconosciuti_mobile_sms),sc(s.sconosciuti_mobile_segreteria),sc(s.sconosciuti_mobile_msg_lasciato),sc(s.sconosciuti_mobile_msg_non_lasciato)],
          backgroundColor:'#c8a96e',borderRadius:4},
        {label:'Fisso',data:[sc(s.sconosciuti_fissi_non_risposti),0,sc(s.sconosciuti_fissi_segreteria),sc(s.sconosciuti_fissi_msg_lasciato),sc(s.sconosciuti_fissi_msg_non_lasciato)],
          backgroundColor:'#42a5f5',borderRadius:4},
        {label:'Privati',data:[sc(s.privati_non_risposti),0,sc(s.privati_segreteria),sc(s.privati_msg_lasciato),sc(s.privati_msg_non_lasciato)],
          backgroundColor:'#e53935',borderRadius:4}
      ]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{padding:16,font:{size:12},usePointStyle:true,pointStyle:'rect'}},
        title:{display:true,text:'Dettaglio azioni per tipo',color:'#c8a96e',font:{size:14}}},
        scales:{x:{grid:{color:'#1e1e1e'}},y:{grid:{color:'#1e1e1e'},beginAtZero:true}}}})
  }
}
// BATTERIA — popola i widget batteria nella dashboard
let batteryChart=null;
async function loadBattery(id){
  const sec=document.getElementById('batterySection');
  const tempSec=document.getElementById('battTempSection');
  const chartSec=document.getElementById('battChartSection');
  if(!sec)return;
  const r=await fetch(API+'/testers/'+id+'/batteria');
  const log=r.ok?await r.json():[];
  if(!log.length){
    sec.innerHTML='<div class="w-value" style="color:var(--grigio)">—</div><div class="w-sub">Nessun dato</div>';
    if(tempSec)tempSec.innerHTML='<div class="w-value" style="color:var(--grigio)">—</div><div class="w-sub">Nessun dato</div>';
    return;
  }
  const ultimo=log[0];
  const lvl=ultimo.livello;
  const colore=lvl>50?'var(--verde)':lvl>20?'#ff9800':'var(--rosso)';
  const icona=ultimo.in_carica?'🔌':'🔋';
  const temp=ultimo.temperatura?ultimo.temperatura.toFixed(1):'—';
  sec.innerHTML=`<div class="w-value" style="color:${colore}">${icona} ${lvl}%</div><div class="w-sub">${ultimo.in_carica?'In carica':'In uso'} — ${log.length} rilevazioni</div>`;
  if(tempSec)tempSec.innerHTML=`<div class="w-value" style="color:${parseFloat(temp)>38?'var(--rosso)':parseFloat(temp)>32?'#ff9800':'var(--bianco)'}">${temp}°C</div><div class="w-sub"><span style="font-size:10px;cursor:pointer;color:var(--rosso);opacity:.5" onclick="clearBatteryLog(${id})">Pulisci storico</span></div>`;

  // Grafico andamento
  const canvas=document.getElementById('batteryChart');
  if(!canvas)return;
  const pts=log.slice(0,50).reverse();
  if(batteryChart){batteryChart.destroy();batteryChart=null}
  batteryChart=new Chart(canvas.getContext('2d'),{type:'line',data:{
    labels:pts.map(p=>p.timestamp?.slice(11,16)||''),
    datasets:[{label:'Batteria %',data:pts.map(p=>p.livello),
      borderColor:'#4CAF50',backgroundColor:'rgba(76,175,80,.1)',fill:true,tension:.3,pointRadius:2,borderWidth:2},
      {label:'Temp °C',data:pts.map(p=>p.temperatura||0),
      borderColor:'#ff9800',backgroundColor:'rgba(255,152,0,.05)',fill:false,tension:.3,pointRadius:1,borderWidth:1.5,yAxisID:'y2'}]
  },options:{responsive:true,plugins:{legend:{position:'bottom',labels:{padding:12,font:{size:10},usePointStyle:true,pointStyle:'circle'}}},
    scales:{x:{grid:{color:'#1e1e1e'},ticks:{font:{size:9}}},y:{min:0,max:100,grid:{color:'#1e1e1e'},ticks:{font:{size:9}},title:{display:true,text:'%',color:'#4CAF50',font:{size:10}}},y2:{position:'right',min:15,max:45,grid:{display:false},ticks:{font:{size:9}},title:{display:true,text:'°C',color:'#ff9800',font:{size:10}}}}}})
}
function clearBatteryLog(id){showModal({icon:'🔋',title:'Pulisci storico batteria',message:'Pulire lo storico delle rilevazioni batteria?',type:'danger',onConfirm:async()=>{await fetch(API+'/testers/'+id+'/batteria',{method:'DELETE'});loadBattery(id)}})}

  document.getElementById('viewContent').innerHTML=`
    <div style="max-width:900px">
      <div style="background:rgba(200,169,110,0.08);border:1px solid rgba(200,169,110,0.3);border-radius:8px;padding:14px 18px;margin-bottom:20px">
        <div style="color:var(--oro);font-weight:600;font-size:14px;margin-bottom:4px">🧪 Lista broadcast visibile a tutti i tester accettati</div>
        <div style="color:var(--grigio);font-size:12px;line-height:1.5">
          Scrivi qui le attività che i tester devono eseguire. La lista è <strong>uguale per tutti</strong>: ogni tester la spunta indipendentemente e può aggiungere commenti per ogni voce.
          I numeri (#id) sono <strong>stabili</strong>: se cancelli la voce 3, la 4 resta 4, non diventa 3. Così i tester possono riferirsi sempre alla stessa voce per numero.
        </div>
      </div>

      <div style="background:var(--card2);border:1px solid var(--bordo);border-radius:8px;padding:16px;margin-bottom:20px">
        <textarea id="newTestItem" rows="2" placeholder="Nuova voce della checklist test (es: Attiva la segreteria ARIA e verifica che risponda a un numero sconosciuto)" style="width:100%;background:#1a1a24;color:var(--bianco);border:1px solid var(--bordo);padding:10px;border-radius:4px;font-size:14px;resize:vertical;font-family:inherit"></textarea>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center">
          <button class="btn btn-oro" onclick="addTestItem()">➕ Aggiungi voce</button>
          <button class="btn btn-red" onclick="resetAllTestItems()" style="font-size:12px">🗑 Reset tutto</button>
          <span style="color:var(--grigio);font-size:12px">${countAtt} attive · ${countDel} cancellate · ${total} tester accettati</span>
          <label style="margin-left:auto;color:var(--grigio);font-size:12px;cursor:pointer;user-select:none">
            <input type="checkbox" ${testItemsShowDeleted?'checked':''} onchange="toggleShowDeleted(this.checked)" style="vertical-align:middle;margin-right:4px"> Mostra cancellate
          </label>
        </div>
      </div>

      <div id="testItemsList">${items.length?rows:'<p style="color:var(--grigio);text-align:center;padding:40px">'+(testItemsShowDeleted||countDel===0?'Nessuna voce. Aggiungi la prima sopra.':'Nessuna voce attiva. Attiva "Mostra cancellate" per vedere quelle eliminate.')+'</p>'}</div>
    </div>`;

  // Ripristina il testo e il focus sulla textarea dopo il re-render (per non interrompere l'admin mentre scrive)
  const newTa=document.getElementById('newTestItem');
  if(newTa&&savedText){newTa.value=savedText;if(savedFocus){newTa.focus();try{newTa.setSelectionRange(savedSelStart,savedSelStart)}catch(e){}}}
}

function toggleShowDeleted(val){
  testItemsShowDeleted=val;
  loadTestItems();
}

async function addTestItem(){
  const ta=document.getElementById('newTestItem');
  if(!ta){showToast('Errore: campo non trovato','error');return}
  const testo=ta.value.trim();
  if(!testo){showToast('Scrivi il testo della voce prima di cliccare Aggiungi','error');ta.focus();return}
  try{
    const r=await fetch(API+'/test-items',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({testo})});
    if(r.ok){
      ta.value='';
      showToast('✓ Voce aggiunta','success');
      loadTestItems();
    } else {
      let errMsg='Errore '+r.status;
      try{const d=await r.json();if(d.error)errMsg=d.error}catch(e){}
      showToast('Errore: '+errMsg,'error');
    }
  }catch(err){
    showToast('Errore di connessione: '+err.message,'error');
    console.error('addTestItem error',err);
  }
}

function editTestItem(id,btn){
  const row=document.querySelector('.ti-row[data-id="'+id+'"]');
  const txtEl=row.querySelector('.ti-testo');
  const currentText=txtEl.textContent;
  txtEl.innerHTML=`<textarea id="edit-${id}" rows="2" style="width:100%;background:#1a1a24;color:var(--bianco);border:1px solid var(--oro);padding:8px;border-radius:4px;font-size:14px;font-family:inherit">${escapeHtml(currentText)}</textarea><div style="margin-top:6px;display:flex;gap:6px"><button class="btn btn-oro" style="padding:4px 10px;font-size:11px" onclick="saveTestItemEdit(${id})">Salva</button><button class="btn btn-ghost" style="padding:4px 10px;font-size:11px" onclick="loadTestItems()">Annulla</button></div>`;
  document.getElementById('edit-'+id).focus();
}

async function saveTestItemEdit(id){
  const ta=document.getElementById('edit-'+id);
  const testo=ta.value.trim();
  if(!testo)return;
  const r=await fetch(API+'/test-items/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({testo})});
  if(r.ok){showToast('Voce aggiornata','success');loadTestItems()}
}

function deleteTestItem(id){
  showModal({icon:'🗑️',title:'Cancella voce #'+id,message:'La voce verrà nascosta ai tester ma il numero <strong>'+id+'</strong> non sarà riutilizzato. Puoi ripristinarla in qualsiasi momento.',type:'danger',onConfirm:async()=>{
    await fetch(API+'/test-items/'+id,{method:'DELETE'});
    showToast('Voce #'+id+' cancellata','success');
    loadTestItems();
  }});
}

function resetAllTestItems(){
  showModal({icon:'⚠️',title:'Reset checklist test',message:'Cancellare <strong>TUTTE</strong> le voci della checklist test, i progressi dei tester e tutti i commenti?<br><br>Questa azione è definitiva e non può essere annullata.',type:'danger',onConfirm:async()=>{
    const r=await fetch(API+'/test-items/reset-all',{method:'DELETE',credentials:'include'});
    if(r.ok){showToast('Checklist azzerata','success');loadTestItems()}
    else showToast('Errore nel reset','error');
  }});
}

async function restoreTestItem(id){
  await fetch(API+'/test-items/'+id+'/restore',{method:'POST'});
  showToast('Voce #'+id+' ripristinata','success');
  loadTestItems();
}

async function showTestItemComments(id){
  const comments=await(await fetch(API+'/test-items/'+id+'/comments')).json();
  if(!comments.length){showToast('Nessun commento','info');return}
  const html=comments.map(c=>{
    const time=c.timestamp?new Date(c.timestamp.replace(' ','T')).toLocaleString('it-IT',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}):'';
    return `<div style="background:var(--card2);border-left:3px solid var(--oro);padding:10px 14px;margin-bottom:8px;border-radius:0 6px 6px 0">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:11px;color:var(--grigio)">
        <strong style="color:var(--oro)">${escapeHtml(c.nome)} ${escapeHtml(c.cognome||'')}</strong>
        <span>${time} <button class="btn btn-red" style="padding:2px 8px;font-size:10px;margin-left:6px" onclick="delTestItemComment(${c.id},${id})">✕</button></span>
      </div>
      <div style="font-size:13px;color:var(--bianco);line-height:1.5">${escapeHtml(c.testo)}</div>
    </div>`;
  }).join('');
  showModal({icon:'💬',title:'Commenti voce #'+id,message:'<div style="max-height:400px;overflow-y:auto;text-align:left">'+html+'</div>',type:'info',onConfirm:()=>{}});
}

async function delTestItemComment(commentId,itemId){
  await fetch(API+'/test-items/comments/'+commentId,{method:'DELETE'});
  showTestItemComments(itemId);
}

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function sendBroadcast(){
  const subject=document.getElementById('bcSubject').value.trim();
  const body=document.getElementById('bcBody').value.trim();
  if(!subject||!body){showModal({icon:'📝',title:'Campi mancanti',message:'Compila sia l\'oggetto che il messaggio prima di inviare.',type:'alert'});return}
  showModal({icon:'📢',title:'Conferma invio',message:'Inviare questo messaggio a <strong>TUTTI</strong> i tester accettati?',type:'danger',confirmLabel:'📢 Invia',onConfirm:async()=>{
    const r=await fetch(API+'/broadcast',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({oggetto:subject,testo:body})});
    const d=await r.json();
    document.getElementById('bcStatus').textContent=d.success?'✓ Inviato a '+d.count+' tester':'Errore: '+d.error;
  }});
}

async function saveAppConfig(){
  const link=document.getElementById('updateLink').value.trim();
  const version=document.getElementById('updateVersion').value.trim();
  const notes=document.getElementById('updateNotes').value.trim();
  const status=document.getElementById('configStatus');
  try{
    const r=await fetch(API+'/app-config',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({playstore_link:link,app_version:version,release_notes:notes})});
    if(r.ok){
      status.style.color='var(--verde)';
      status.textContent='✓ Salvato! Il link sarà usato in tutte le email.';
      showToast('Configurazione salvata','success');
      setTimeout(()=>{status.textContent=''},5000);
    }else{
      status.style.color='var(--rosso)';
      status.textContent='Errore nel salvataggio';
    }
  }catch(e){
    status.style.color='var(--rosso)';
    status.textContent='Errore di connessione';
  }
}

function toggleAllUpdateTesters(checked){
  document.querySelectorAll('.update-tester-cb').forEach(cb=>cb.checked=checked);
}

function sendUpdateEmail(){
  const link=document.getElementById('updateLink').value.trim();
  const versione=document.getElementById('updateVersion').value.trim();
  const note=document.getElementById('updateNotes').value.trim();
  if(!link){showToast('Inserisci il link Play Store','error');return}
  const selectedIds=[...document.querySelectorAll('.update-tester-cb:checked')].map(cb=>parseInt(cb.value));
  if(!selectedIds.length){showToast('Seleziona almeno un tester','error');return}
  showModal({icon:'📧',title:'Conferma invio email',message:`Inviare l'email di aggiornamento a <strong>${selectedIds.length}</strong> tester?${versione?' Versione: <strong>'+versione+'</strong>':''}`,type:'danger',confirmLabel:'📧 Invia',onConfirm:async()=>{
    const status=document.getElementById('updateStatus');
    status.textContent='Invio in corso...';
    status.style.color='var(--oro)';
    try{
      const r=await fetch(API+'/send-update',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({tester_ids:selectedIds,link,versione,note})});
      const d=await r.json();
      if(d.success){
        status.style.color='var(--verde)';
        status.textContent=`✓ Inviate ${d.sent} email${d.errors?' ('+d.errors+' errori)':''}`;
        showToast(`Email inviate a ${d.sent} tester`,'success');
      }else{
        status.style.color='var(--rosso)';
        status.textContent='Errore: '+d.error;
      }
    }catch(e){
      status.style.color='var(--rosso)';
      status.textContent='Errore di connessione';
    }
  }});
}
</script>
</body>
</html>
